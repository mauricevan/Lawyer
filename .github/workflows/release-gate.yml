name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          cd frontend && npm ci
      - name: Run automated release checklist
        run: chmod +x scripts/ops/run-release-checklist.sh && ./scripts/ops/run-release-checklist.sh

  stack-aware-eval:
    runs-on: ubuntu-latest
    needs: release-checklist
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lawyer
          POSTGRES_PASSWORD: lawyer_dev
          POSTGRES_DB: lawyer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
    env:
      DATABASE_URL: postgresql+asyncpg://lawyer:lawyer_dev@localhost:5432/lawyer
      QDRANT_URL: http://localhost:6333
      USE_LOCAL_EMBEDDINGS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r ingestion/requirements.txt
      - name: Stack-aware release eval
        run: |
          chmod +x scripts/qa/run-stack-aware-eval.sh scripts/qa/run-integration-eval-gate.sh
          ./scripts/qa/run-stack-aware-eval.sh --required
