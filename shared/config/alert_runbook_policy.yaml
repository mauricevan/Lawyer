# Tier-1 alert → runbook mapping (plan14 AD)
version: "2026.07.03"

gate:
  min_coverage_ratio: 1.0
  require_prometheus_runbook_url: true

prometheus_alerts_path: observability/prometheus/alerts.yml

required_playbooks:
  - docs/engineering/playbooks/incident-response.md
  - docs/ops/hotfix-runbook.md
  - docs/ops/dependency-degradation-runbook.md

tier1_alerts:
  - id: LawyerBackendDown
    severity: P0
    runbook: docs/ops/hotfix-runbook.md
    playbook: docs/engineering/playbooks/incident-response.md
  - id: LawyerTier1ReadyDegraded
    severity: P0
    runbook: docs/ops/dependency-degradation-runbook.md
    playbook: docs/engineering/playbooks/incident-response.md
  - id: LawyerPostgresDown
    severity: P0
    runbook: docs/ops/dependency-degradation-runbook.md
    playbook: docs/engineering/playbooks/incident-response.md
  - id: LawyerQdrantDown
    severity: P1
    runbook: docs/ops/dependency-degradation-runbook.md
    playbook: docs/engineering/playbooks/incident-response.md

report:
  path: docs/data/reliability-reports/incident-playbook-audit-latest.json
