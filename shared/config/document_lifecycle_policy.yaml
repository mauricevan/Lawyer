# Document lifecycle policy (plan13 AA)
version: "2026.07.03"

staleness:
  max_index_age_hours: 168
  critical_index_age_hours: 720
  modified_drift_is_stale: true

scan_gates:
  max_never_indexed: 0
  max_critical: 0
  max_stale: 25

reindex:
  trigger_on_modified_drift: true
  trigger_on_never_indexed: true
  sla_hours: 72

report:
  path: docs/data/lifecycle-reports/staleness-latest.json

reindex_report:
  path: docs/data/lifecycle-reports/reindex-latest.json
