# Eval regression thresholds (plan7 O)
version: "2026.07.02"

suites:
  retrieval:
    recall_at_5_min: 0.80
    mrr_min: 0.70
    fixture: backend/tests/fixtures/rag_eval_questions.json
    max_regression: 0.05

  multilingual:
    recall_at_5_min: 0.85
    fixture: backend/tests/fixtures/rag_eval_multilingual.json
    max_regression: 0.05
    note: native corpus target (EXP-001); NL-fallback floor 0.70

  domain:
    recall_at_5_min: 0.70
    script: scripts/qa/run-domain-benchmark.sh

  ci_integration:
    recall_at_5_min: 0.85
    mrr_min: 0.70
    fixture: backend/tests/fixtures/rag_eval_ci_subset.json
    max_regression: 0.05
    note: offline CI seed; runs on every PR (TD-004)

  reranker_ab:
    script: scripts/qa/run-reranker-ab-eval.sh
    config: shared/config/reranker_models.yaml
    report: docs/data/eval-reports/reranker-ab-latest.json
    note: EXP-002; requires live Qdrant corpus

  router_intent:
    script: scripts/qa/run-router-intent-eval.sh
    fixture: backend/tests/fixtures/router_intent_eval.json
    config: shared/config/query_intent_library.yaml

  longtail:
    recall_at_5_min: 0.75
    mrr_min: 0.65
    fixture: backend/tests/fixtures/rag_eval_longtail.json
    script: scripts/qa/run-longtail-eval.sh
    report: docs/data/eval-reports/longtail-latest.json
    max_regression: 0.05
    note: edge-case paraphrase and vague queries (plan12 AD)

  lifecycle:
    script: scripts/platform/run-lifecycle-eval-gate.sh
    report: docs/data/lifecycle-reports/lifecycle-gate-latest.json
    note: plan13 AD — deprecation register, version policy, optional staleness

release_policy:
  block_on_regression: true
  require_baseline_update_on_improvement: true
  report_path: docs/data/eval-reports/latest.json
