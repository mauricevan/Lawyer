# Reranker model variants for EXP-002 A/B (plan12 AA)
version: "2026.07.03"

default_variant: control

variants:
  control:
    model_id: cross-encoder/ms-marco-MiniLM-L-6-v2
    description: Production baseline cross-encoder

  candidate:
    model_id: cross-encoder/ms-marco-MiniLM-L-12-v2
