name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run backend unit tests
        run: pytest backend/tests -q -m "not integration"
      - name: Run API e2e tests
        run: pytest backend/tests/test_query_api_e2e.py -q

  integration-eval:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lawyer
          POSTGRES_PASSWORD: lawyer_dev
          POSTGRES_DB: lawyer
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
    env:
      DATABASE_URL: postgresql+asyncpg://lawyer:lawyer_dev@localhost:5432/lawyer
      QDRANT_URL: http://localhost:6333
      USE_LOCAL_EMBEDDINGS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r ingestion/requirements.txt
      - name: Run integration eval gate
        run: chmod +x scripts/qa/run-integration-eval-gate.sh && ./scripts/qa/run-integration-eval-gate.sh

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --run

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pip-audit
      - name: Dependency vulnerability scan
        run: pip-audit -r backend/requirements.txt --strict --desc on
      - name: Run security regression tests
        run: pytest backend/tests/test_ssrf_guard.py backend/tests/test_auth_service.py backend/tests/test_security_rbac.py backend/tests/test_rbac_service.py backend/tests/test_audit_completeness_service.py backend/tests/test_audit_retention_service.py backend/tests/test_data_retention_service.py backend/tests/test_data_classification.py backend/tests/test_input_validation.py backend/tests/test_input_validation_audit.py backend/tests/test_feedback_route.py backend/tests/test_answer_policy_service.py -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x scripts/security/check-secrets.sh scripts/security/check-log-output.sh scripts/security/run-input-validation-audit.sh
      - run: ./scripts/security/check-secrets.sh all
      - run: ./scripts/security/check-log-output.sh
      - run: ./scripts/security/run-input-validation-audit.sh
