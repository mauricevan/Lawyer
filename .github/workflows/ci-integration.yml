name: Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  retrieval-eval:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.12.5
        ports:
          - 6333:6333
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r ingestion/requirements.txt
      - name: Seed corpus (if available)
        run: PYTHONPATH=. python ingestion/scripts/seed_corpus.py || true
        env:
          QDRANT_URL: http://localhost:6333
          DATABASE_URL: sqlite+aiosqlite:///:memory:
      - name: Run retrieval eval gate
        run: chmod +x scripts/qa/run-retrieval-eval.sh && ./scripts/qa/run-retrieval-eval.sh
        env:
          QDRANT_URL: http://localhost:6333
          USE_LOCAL_EMBEDDINGS: "true"
