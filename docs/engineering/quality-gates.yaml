# Harmonized quality gates (plan8 R)
version: "2026.07.02"

gates:
  unit_tests:
    scope: all
    command: pytest backend/tests -m "not integration" -q
    required_on: [pr, release]

  frontend_tests:
    scope: frontend
    command: npm test -- --run
    working_dir: frontend
    required_on: [pr]

  security_regression:
    scope: backend
    command: pytest backend/tests/test_ssrf_guard.py backend/tests/test_auth_service.py backend/tests/test_security_rbac.py -q
    required_on: [pr]

  secret_scan:
    scope: repo
    script: scripts/security/check-secrets.sh
    required_on: [pr, release]

  pair_review:
    scope: critical_paths
    script: scripts/ops/check-pair-review.sh
    required_on: [merge_main]

  knowledge_base:
    scope: docs
    script: scripts/ops/run-knowledge-base-check.sh
    required_on: [release]

  release_eval:
    scope: retrieval
    script: scripts/qa/run-release-eval-suite.sh
    stack_script: scripts/qa/run-stack-aware-eval.sh
    required_on: [release]

  integration_eval:
    scope: retrieval
    script: scripts/qa/run-integration-eval-gate.sh
    required_on: [pr, release]

  failover_eval:
    scope: reliability
    script: scripts/qa/run-failover-eval.sh
    required_on: [pr, release]

  readiness_pass_rate:
    scope: reliability
    script: scripts/platform/run-readiness-pass-rate-gate.sh
    required_on: [release]

  policy_registry:
    scope: governance
    script: scripts/platform/run-policy-registry-gate.sh
    required_on: [pr, release]

  partner_api:
    scope: integrations
    script: scripts/platform/run-partner-api-gate.sh
    required_on: [release]

  risk_acceptance:
    scope: governance
    script: scripts/platform/run-risk-acceptance-gate.sh
    required_on: [release]

  decision_log_audit:
    scope: governance
    script: scripts/ops/run-decision-log-audit.sh
    required_on: [release]

  governance_snapshot:
    scope: governance
    script: scripts/ops/run-governance-snapshot.sh
    required_on: [quarterly, release]

  cycle_plans:
    scope: governance
    script: scripts/platform/run-cycle-plan-gate.sh
    args: ["--all"]
    required_on: [release]

  project_completion:
    scope: governance
    script: scripts/ops/run-project-completion-gate.sh
    required_on: [release]

  recovery_drill:
    scope: reliability
    script: scripts/ops/run-recovery-drill-gate.sh
    required_on: [quarterly, release]

  incident_playbook_audit:
    scope: reliability
    script: scripts/ops/run-incident-playbook-audit.sh
    required_on: [release]

  quality_audit:
    scope: governance
    script: scripts/ops/run-quality-gate-audit.sh
    required_on: [release]

ci_mapping:
  workflow: .github/workflows/ci.yml
  jobs: [backend-tests, integration-eval, frontend-tests, security-scan, secret-scan]

solo_overrides:
  pair_review_ack_env: PAIR_REVIEW_ACK
  release_eval_note: "Full suite via run-stack-aware-eval.sh --required when Qdrant+Postgres up."
