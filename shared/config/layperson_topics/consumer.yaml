# Consumer topics — warranty, imports, food labelling, car rental
topics:
  - id: webshop_regels_overzicht
    patterns:
      - webshop
      - webwinkel
      - e-commerce
      - online winkel
      - persoonsgegevens verwerkt
      - persoonsgegevens
      - consumenten verkoopt
      - consumenten
      - welke eu-regels
      - regels van toepassing
    min_pattern_hits: 2
    regulation_celex: "32016R0679"
    regulation_title: "AVG, consumentenrechten en e-commerce"
    short_answer_nl: >
      Een webshop die **persoonsgegevens verwerkt** én **producten aan consumenten verkoopt**,
      valt onder **meerdere EU-regels**: vooral de **AVG (GDPR)** voor privacy, de
      **Richtlijn consumentenrechten (2011/83/EU)** voor koop op afstand, bedenktijd en
      informatieplichten, en vaak ook regels over **cookies** en **digitale diensten**.
    summary_nl: >
      De AVG verplicht rechtmatige verwerking, transparantie, beveiliging en rechten van
      klanten (inzage, wissen). Consumentenrecht verplicht duidelijke prijsinformatie,
      bedenktijd van 14 dagen bij koop op afstand en garantie bij gebreken. Marketingcookies
      vereisen meestal voorafgaande toestemming.
    practical_nl: >
      1. Publiceer privacyverklaring en cookiebeleid. 2. Toon totaalprijs, verzendkosten en
      bedenktijd vóór aankoop. 3. Houd een verwerkingsregister bij. 4. Raadpleeg de AP bij
      twijfel over gegevensverwerking.

  - id: consumer_withdrawal_period
    patterns:
      - herroepingstermijn
      - herroepingsrecht
      - herroeping
      - overeenkomst op afstand
      - koop op afstand
      - bedenktijd
      - 2011/83
    exclude_patterns:
      - hotel
      - huurauto
      - abonnement
      - software
      - digitale inhoud
    min_pattern_hits: 1
    regulation_celex: "32011L0083"
    regulation_title: "Richtlijn 2011/83/EU consumentenrechten"
    short_answer_nl: >
      De **herroepingstermijn** bij een **overeenkomst op afstand** is in principe
      **14 kalenderdagen** vanaf de dag na ontvangst van het product (artikel 9).
    summary_nl: >
      Richtlijn 2011/83/EU geeft consumenten het recht om binnen 14 dagen zonder opgave
      van redenen af te zien van de overeenkomst. Artikel 10 regelt de uitoefening;
      artikel 22 de gevolgen. Uitzonderingen staan in artikel 16 (bijv. op maat gemaakte
      goederen, verzegelde hygiëneproducten).
    practical_nl: >
      Controleer of u binnen 14 dagen een duidelijke herroeping stuurt (bijv. per e-mail).
      Bewaar bewijs van verzending en retour. Verkopers moeten binnen 14 dagen na
      herroeping terugbetalen.

  - id: online_warranty
    patterns:
      - garantie
      - online kopen
      - webshop
      - wasmachine
      - bedenktijd
      - opgelicht via een webshop
      - geld terugvorderen
      - tweedehands auto
      - verborgen gebreken
      - auto uit belgi
      - elektrische fiets
      - defecte
    exclude_patterns:
      - chargeback
      - creditcardgegevens
      - creditcard
      - betalingsgeschil
      - restvoorraad
      - uitverkocht
      - prijsalert
      - terug op voorraad
      - notificatie
      - in de aanbieding
    min_pattern_hits: 2
    regulation_celex: "32011L0083"
    regulation_title: "Richtlijn 2011/83/EU consumentenrechten"
    short_answer_nl: >
      Bij online aankopen binnen de EU hebt u minimaal **2 jaar wettelijke garantie**
      op gebreken. U hebt ook een **bedenktijd van 14 dagen** bij koop op afstand.
    summary_nl: >
      EU-regels verplichten verkopers om duidelijke informatie te geven vóór de koop.
      Bij gebreken kunt u reparatie, vervanging of terugbetaling eisen.
    practical_nl: >
      Bewaar orderbevestiging en communicatie. Meld gebreken schriftelijk binnen
      redelijke termijn en vraag om herstel of terugbetaling.

  - id: wine_import_personal
    patterns:
      - wijn import
      - wijn uit frankrijk
      - liter wijn
      - belastingvrij
      - wijn meenemen
      - frankrijk naar nederland
    regulation_celex: "32009R1100"
    regulation_title: "Verordening (EU) nr. 1100/2008 en douaneregelgeving"
    short_answer_nl: >
      Voor **privé-import** mag u meestal **tot ca. 90 liter wijn** belastingvrij
      meenemen uit Frankrijk naar Nederland, mits het echt voor **eigen gebruik** is.
    summary_nl: >
      Binnen de EU gelden accijnsregels, maar voor eigen gebruik zijn grotere
      hoeveelheden toegestaan. Douane kan bij commerciële hoeveelheden vragen stellen.
    practical_nl: >
      Bewaar aankoopbewijs. Bij grote hoeveelheden: check douane-limieten van uw land.

  - id: import_car
    patterns:
      - elektrische auto import
      - typegoedkeuring
      - auto uit duitsland
      - klassieke auto
      - emissie
      - registratie
      - auto uit itali
    regulation_celex: "32018R0858"
    regulation_title: "Verordening (EU) 2018/858 typegoedkeuring voertuigen"
    short_answer_nl: >
      Geïmporteerde auto's moeten voldoen aan **EU-typegoedkeuring** en **emissie-eisen**
      bij registratie. Klassieke auto's kunnen soms onder vereenvoudigde regels vallen.
    summary_nl: >
      EU-regels harmoniseren technische eisen voor voertuigen. Bij import uit een
      andere EU-lidstaat gelden vaak vereenvoudigde procedures, maar keuring en
      registratie blijven nationaal geregeld.
    practical_nl: >
      Vraag het CVO op en check RDW-regels vóór aankoop. Laat emissies en veiligheid keuren.

  - id: food_allergen_labelling
    patterns:
      - allergenen
      - allergenen menu
      - restaurant allergenen
      - voedselallergie
    regulation_celex: "32011R1169"
    regulation_title: "Verordening (EU) nr. 1169/2011 levensmiddeleninformatie"
    short_answer_nl: >
      **Ja**, horeca moet **14 allergenen** vermelden (op menu, bord of schriftelijk).
      U moet duidelijk kunnen zien welke allergenen in een gerecht zitten.
    summary_nl: >
      EU-regels verplichten vermelding van allergenen zoals gluten, noten, melk en
      schaal- en schelpdieren. Dit geldt ook voor restaurants en catering.
    practical_nl: >
      Vraag personeel om schriftelijke allergeneninformatie als het menu onduidelijk is.
      Meld ernstige reacties bij de NVWA.

  - id: eu_conformity_declaration
    patterns:
      - conformiteitsverklaring
      - EU-conformiteitsverklaring
      - verklaring van conformiteit
      - harmonisatiewetgeving
      - harmonisatie wetgeving
      - harmonisatiewetgeving
      - fabrikant opnemen
    regulation_celex: "32019R1020"
    regulation_title: "Verordening (EU) 2019/1020 markttoezicht en productconformiteit"
    short_answer_nl: >
      De **EU-conformiteitsverklaring** moet minimaal bevatten: **identificatie van het product**,
      **naam en adres van de fabrikant** (of gemachtigde importeur), een **verklaring dat de
      fabrikant verantwoordelijkheid neemt** voor de conformiteit, **verwijzing naar de relevante
      harmonisatiewetgeving**, en — indien van toepassing — **geharmoniseerde normen** of
      technische specificaties, **notified body**-gegevens, plus **datum, plaats en handtekening**
      van bevoegde persoon.
    summary_nl: >
      Onder EU-markttoezicht- en productregels (waaronder GPSR 2023/988) moet de fabrikant
      aantonen dat het product voldoet aan toepasselijke harmonisatiewetgeving. De
      conformiteitsverklaring hoort bij technische documentatie en CE-markering waar verplicht.
      Exacte verplichtingen kunnen per productcategorie verschillen.
    practical_nl: >
      1. Controleer welke productrichtlijn/verordening op uw product van toepassing is.
      2. Gebruik het EU-model voor conformiteitsverklaring. 3. Bewaar technische documentatie
      minstens 10 jaar. 4. Raadpleeg NVWA of notified body bij twijfel.

  - id: ce_marking_consumer
    patterns:
      - ce-markering
      - ce markering
      - etsy
      - sieraden verkopen
      - handgemaakte sieraden
    regulation_celex: "32023R0988"
    regulation_title: "Verordening (EU) 2023/988 productveiligheid (GPSR)"
    short_answer_nl: >
      **Niet altijd.** CE-markering is **verplicht voor sommige producttypes**
      (bijv. speelgoed, elektronica), maar **niet voor alle sieraden**.
    summary_nl: >
      Of CE-markering verplicht is, hangt af van productcategorie en risico's.
      Sieraden vallen vaak onder algemene productveiligheid, niet altijd CE-plicht.
      Speelgoed en elektronica hebben strengere eisen.
    practical_nl: >
      Check welke EU-productregels voor uw artikel gelden. Raadpleeg ECC bij export
      naar andere EU-landen.

  - id: car_rental_consumer
    patterns:
      - huurauto
      - auto huren
      - krassen
      - huur auto spanje
    regulation_celex: "32011L0083"
    regulation_title: "Richtlijn 2011/83/EU consumentenrechten"
    short_answer_nl: >
      **Ja, soms.** U mag een huurauto **weigeren** bij grote schade die niet op
      het contract staat. Documenteer schade **vóór vertrek** voor terugbetaling.
    summary_nl: >
      EU-consumentenrecht verplicht duidelijke informatie vóór de koop of huur.
      Bij huurauto's moet u schade bij ophalen noteren; bij oneerlijke afrekening
      kunt u klagen bij de verhuurder of ECC.
    practical_nl: >
      Maak foto's en video bij ophalen. Weiger te tekenen als schade niet klopt.
      Bewaar het huurcontract en alle e-mails.

  - id: digital_content_subscription
    patterns:
      - software abonnement
      - software met abonnement
      - updates stoppen
      - digitale inhoud
      - saas abonnement
    regulation_celex: "32019L0770"
    regulation_title: "Richtlijn (EU) 2019/770 contracten digitale inhoud"
    short_answer_nl: >
      **Nee, niet zomaar.** Bij digitale abonnementen moet de verkoper **duidelijk**
      informeren over updates. Updates stoppen terwijl u betaalt kan **onrechtmatig** zijn.
    summary_nl: >
      EU-regels voor digitale inhoud en diensten verplichten transparante contractinfo.
      Herroepingsrecht geldt anders dan bij fysieke producten; updates moeten
      contractueel passen bij wat u kocht.
    practical_nl: >
      Lees de licentievoorwaarden. Bij stopzetting updates: vraag schriftelijk om
      herstel of beëindiging van het abonnement.

  - id: psd2_chargeback
    patterns:
      - chargeback
      - creditcardgegevens
      - creditcard gelekt
      - betalingsgeschil
      - creditcard fraude
    regulation_celex: "32015L2366"
    regulation_title: "Richtlijn (EU) 2015/2366 (PSD2)"
    short_answer_nl: >
      **Ja, vaak wel.** U kunt via uw **bank een chargeback** aanvragen bij fraude
      of onterechte afschrijving. Meld het **binnen 13 maanden** (vaak sneller bij fraude).
    summary_nl: >
      PSD2 geeft consumenten rechten bij betalingsgeschillen en fraude. Uw bank
      onderzoekt de claim; bij bewezen fraude kunt u geld terugkrijgen.
    practical_nl: >
      Blokkeer uw kaart direct. Dien chargeback-aanvraag in bij uw bank met bewijs.
      Doe aangifte bij politie bij diefstal van gegevens.
