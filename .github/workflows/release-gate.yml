name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          cd frontend && npm ci
      - name: Run automated release checklist
        run: chmod +x scripts/ops/run-release-checklist.sh && ./scripts/ops/run-release-checklist.sh
